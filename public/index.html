  <!-- PWA Service Worker Registration + Update Banner -->
  <style>
    .sw-update-banner{position:fixed;bottom:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#1e3a5f,#0d1428);border-top:2px solid #D4AF37;padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:14px;font-family:var(--font-sans,Inter,sans-serif);font-size:14px;color:#e5e7eb;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
    .sw-update-banner.visible{transform:translateY(0)}
    .sw-update-banner button{background:#D4AF37;color:#0d1428;border:none;padding:8px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px}
    .sw-update-banner button:hover{background:#e5c04b}
    .sw-update-banner .dismiss{background:transparent;color:#9ca3af;padding:4px 8px;font-size:18px;line-height:1}
  </style>
  <div class="sw-update-banner" id="swUpdateBanner">
    <span>⚡ Доступна новая версия АСГАРД CRM</span>
    <button id="swUpdateBtn">Обновить</button>
    <button class="dismiss" id="swUpdateDismiss" aria-label="Закрыть">✕</button>
  </div>
  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      var _newWorker = null;

      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(reg) {
            console.log('[PWA] SW registered:', reg.scope);

            // Check for updates every 30 minutes
            setInterval(function(){ reg.update(); }, 30 * 60 * 1000);

            reg.addEventListener('updatefound', function() {
              _newWorker = reg.installing;
              _newWorker.addEventListener('statechange', function() {
                if (_newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New SW waiting — show update banner
                  var banner = document.getElementById('swUpdateBanner');
                  if (banner) banner.classList.add('visible');
                }
              });
            });
          })
          .catch(function(err){ console.log('[PWA] SW registration failed:', err); });

        // Handle controller change (after skipWaiting)
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      });

      // Update button
      document.getElementById('swUpdateBtn').addEventListener('click', function() {
        if (_newWorker) {
          _newWorker.postMessage('skipWaiting');
        } else {
          window.location.reload();
        }
      });

      // Dismiss
      document.getElementById('swUpdateDismiss').addEventListener('click', function() {
        document.getElementById('swUpdateBanner').classList.remove('visible');
      });

      // Handle push notification clicks (from SW)
      if (navigator.serviceWorker) {
        navigator.serviceWorker.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'NOTIFICATION_CLICK' && e.data.url) {
            if (e.data.url.startsWith('#')) {
              location.hash = e.data.url;
            } else {
              location.href = e.data.url;
            }
          }
        });
      }
    })();
  </script>
