  <!-- PWA Service Worker Registration + Update Banner -->
  <style>
    .sw-update-banner{position:fixed;bottom:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#1e3a5f,#0d1428);border-top:2px solid #D4AF37;padding:14px 20px;display:none;align-items:center;justify-content:center;gap:14px;font-family:var(--font-sans,Inter,sans-serif);font-size:14px;color:#e5e7eb;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
    .sw-update-banner.visible{display:flex;transform:translateY(0)}
    .sw-update-banner button{background:#D4AF37;color:#0d1428;border:none;padding:8px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px}
    .sw-update-banner button:hover{background:#e5c04b}
    .sw-update-banner .dismiss{background:transparent;color:#9ca3af;padding:4px 8px;font-size:18px;line-height:1}
  </style>
  <div class="sw-update-banner" id="swUpdateBanner">
    <span>⚡ Доступна новая версия АСГАРД CRM</span>
    <button id="swUpdateBtn">Обновить</button>
    <button class="dismiss" id="swUpdateDismiss" aria-label="Закрыть">✕</button>
  </div>
  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;

      var _registration = null;
      var _newWorker = null;
      var _reloading = false;
      var SHELL_VERSION = window.ASGARD_SHELL_VERSION || '8.9.3-corrective1';

      function setBannerVisible(visible) {
        var banner = document.getElementById('swUpdateBanner');
        if (!banner) return;
        banner.classList[visible ? 'add' : 'remove']('visible');
      }

      function trackInstalling(worker) {
        if (!worker) return;
        _newWorker = worker;
        worker.addEventListener('statechange', function() {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) {
            setBannerVisible(true);
          }
        });
      }

      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js?v=' + encodeURIComponent(SHELL_VERSION))
          .then(function(reg) {
            _registration = reg;
            console.log('[PWA] SW registered:', reg.scope, SHELL_VERSION);

            if (reg.waiting) {
              _newWorker = reg.waiting;
              setBannerVisible(true);
            }
            if (reg.installing) {
              trackInstalling(reg.installing);
            }

            reg.addEventListener('updatefound', function() {
              trackInstalling(reg.installing);
            });

            setInterval(function() {
              reg.update().catch(function(err) {
                console.log('[PWA] SW update check failed:', err);
              });
            }, 30 * 60 * 1000);
          })
          .catch(function(err){ console.log('[PWA] SW registration failed:', err); });

        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (_reloading) return;
          _reloading = true;
          window.location.reload();
        });
      });

      document.getElementById('swUpdateBtn').addEventListener('click', function() {
        var waitingWorker = (_registration && _registration.waiting) || _newWorker;
        if (waitingWorker) {
          setBannerVisible(false);
          waitingWorker.postMessage('skipWaiting');
          return;
        }
        if (_registration) {
          _registration.update().catch(function(err) {
            console.log('[PWA] Manual SW update failed:', err);
          });
        }
      });

      document.getElementById('swUpdateDismiss').addEventListener('click', function() {
        setBannerVisible(false);
      });

      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'NOTIFICATION_CLICK' && e.data.url) {
          if (e.data.url.startsWith('#')) {
            location.hash = e.data.url;
          } else {
            location.href = e.data.url;
          }
        }
      });
    })();
  </script>
