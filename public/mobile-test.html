<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0D0D0F"/>
  <title>ASGARD CRM — Mobile v3 Showcase</title>
  <link rel="stylesheet" href="assets/css/mobile_v3.css"/>
  <style>
    /* Minimal inline fallback before DS loads */
    body { margin: 0; padding: 0; background: #0D0D0F; color: #F5F5F7; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
    .mv3-shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .mv3-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <div class="mv3-shell" id="mv3-app">
    <div class="mv3-content mv3-no-scrollbar" id="mv3-content">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px">
        <div style="font-size:32px">⚔️</div>
        <div style="font-size:14px;color:#8E8E93">Загрузка ASGARD...</div>
      </div>
    </div>
    <!-- TAB BAR -->
    <div id="mv3-tabbar"></div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/mobile_v3/ds.js"></script>
  <script src="assets/js/mobile_v3/core.js"></script>
  <script src="assets/js/mobile_v3/components.js"></script>
  <script src="assets/js/mobile_v3/test.js"></script>

  <script>
  (function() {
    'use strict';

    // Init DS
    DS.injectStyles();

    // Render test page
    const content = document.getElementById('mv3-content');
    content.innerHTML = '';
    content.appendChild(TestPage.render());

    // Build TabBar
    const tabbar = document.getElementById('mv3-tabbar');
    const t = DS.t;

    Object.assign(tabbar.style, {
      display: 'flex',
      alignItems: 'flex-end',
      justifyContent: 'space-around',
      background: 'linear-gradient(180deg, ' + t.tabBarBg + ' 0%, ' + t.tabBarBg + ' 100%)',
      backdropFilter: 'blur(30px) saturate(1.4)',
      WebkitBackdropFilter: 'blur(30px) saturate(1.4)',
      borderTop: '0.5px solid rgba(255,255,255,0.08)',
      padding: '8px 8px calc(8px + env(safe-area-inset-bottom, 0px))',
      flexShrink: 0,
      zIndex: 100,
    });

    const tabs = [
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>', label: 'Главная', active: false },
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>', label: 'Тендеры', active: false },
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>', label: 'Работы', active: false },
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>', label: 'Задачи', active: false, badge: '4' },
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>', label: 'Ещё', active: false },
    ];

    tabs.forEach((tab, i) => {
      const item = document.createElement('div');
      item.className = 'mv3-tabbar__item' + (i === 0 ? ' active' : '');
      Object.assign(item.style, {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        gap: '3px', padding: '6px 12px 4px', borderRadius: '14px',
        cursor: 'pointer', position: 'relative', transition: 'all 0.22s ease',
        minWidth: '56px', WebkitTapHighlightColor: 'transparent',
      });

      const iconWrap = document.createElement('div');
      iconWrap.className = 'mv3-tabbar__icon';
      iconWrap.style.color = i === 0 ? t.text : t.textSec;
      iconWrap.style.opacity = i === 0 ? '1' : '0.6';
      iconWrap.innerHTML = tab.icon;
      item.appendChild(iconWrap);

      const label = document.createElement('div');
      label.className = 'mv3-tabbar__label';
      Object.assign(label.style, {
        fontSize: '10px', fontWeight: 600, lineHeight: 1,
        color: i === 0 ? t.text : t.textSec,
      });
      label.textContent = tab.label;
      item.appendChild(label);

      if (tab.badge) {
        const badge = document.createElement('div');
        badge.className = 'mv3-tabbar__badge';
        badge.textContent = tab.badge;
        item.appendChild(badge);
      }

      item.addEventListener('click', () => {
        // Highlight
        tabbar.querySelectorAll('.mv3-tabbar__item').forEach((el, idx) => {
          const isAct = idx === i;
          el.className = 'mv3-tabbar__item' + (isAct ? ' active' : '');
          el.style.background = isAct ? 'linear-gradient(180deg, rgba(74,144,217,0.12) 0%, rgba(229,57,53,0.08) 100%)' : 'transparent';
          el.querySelector('.mv3-tabbar__icon').style.color = isAct ? DS.t.text : DS.t.textSec;
          el.querySelector('.mv3-tabbar__icon').style.opacity = isAct ? '1' : '0.6';
          el.querySelector('.mv3-tabbar__label').style.color = isAct ? DS.t.text : DS.t.textSec;
        });

        if (i === 4) {
          openBurger();
        } else {
          M.Toast({ message: tab.label, type: 'info', duration: 1500 });
        }

        try { navigator.vibrate(10); } catch(e) {}
      });

      // Set initial active style
      if (i === 0) {
        item.style.background = 'linear-gradient(180deg, rgba(74,144,217,0.12) 0%, rgba(229,57,53,0.08) 100%)';
      }

      tabbar.appendChild(item);
    });

    // Re-render on theme change
    window.addEventListener('asgard:theme', () => {
      const t = DS.t;
      content.innerHTML = '';
      content.appendChild(TestPage.render());
      tabbar.style.background = 'linear-gradient(180deg, ' + t.tabBarBg + ' 0%, ' + t.tabBarBg + ' 100%)';
      tabbar.querySelectorAll('.mv3-tabbar__item').forEach((el, idx) => {
        const isAct = el.classList.contains('active');
        el.querySelector('.mv3-tabbar__icon').style.color = isAct ? t.text : t.textSec;
        el.querySelector('.mv3-tabbar__label').style.color = isAct ? t.text : t.textSec;
      });
    });

    console.log('[ASGARD] Mobile v3 Showcase loaded — 40 components');
  })();
  </script>
</body>
</html>
