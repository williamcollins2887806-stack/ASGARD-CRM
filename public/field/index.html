<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=/m/field-login">
  <title>ASGARD Field — Redirect</title>
  <script>
    // Unregister old field SW before redirect
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => { if (r.scope.includes('/field')) r.unregister(); });
      });
    }
    // Clear old field caches
    if ('caches' in window) {
      caches.keys().then(names => {
        names.filter(n => n.startsWith('field-')).forEach(n => caches.delete(n));
      });
    }
    window.location.replace('/m/field-login');
  </script>
</head>
<body style="background:#0D0D0F;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh">
  <p>Перенаправление на новую версию...</p>
</body>
</html>
