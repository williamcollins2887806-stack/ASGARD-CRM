<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D0D0F">
  <title>ASGARD Field — Preview All Screens</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      background: #111113; color: #F4F4F5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px; line-height: 1.5;
    }
    input, button, textarea, select { font-family: inherit; font-size: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    @font-face { font-family: 'Inter'; src: url('/assets/fonts/inter.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('/assets/fonts/inter-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('/assets/fonts/inter-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

    /* Preview layout */
    .preview-container {
      max-width: 430px;
      margin: 0 auto;
      padding: 20px 0;
    }
    .preview-banner {
      text-align: center;
      padding: 40px 20px 30px;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
      border-radius: 0 0 24px 24px;
      margin-bottom: 20px;
    }
    .preview-banner h1 {
      color: #D4A843;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .preview-banner p {
      color: #A1A1AA;
      font-size: 0.875rem;
    }
    .screen-label {
      text-align: center;
      padding: 24px 20px 8px;
      color: #D4A843;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .screen-label span {
      background: rgba(212,168,67,0.1);
      padding: 6px 16px;
      border-radius: 9999px;
      border: 1px solid rgba(212,168,67,0.2);
    }
    .phone-frame {
      background: #0D0D0F;
      border-radius: 32px;
      border: 3px solid rgba(255,255,255,0.06);
      margin: 8px 12px 20px;
      overflow: hidden;
      min-height: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Animations */
    @keyframes fieldPulse{0%,100%{box-shadow:0 0 0 0 rgba(196,154,42,0.4)}50%{box-shadow:0 0 0 12px rgba(196,154,42,0)}}
    @keyframes fieldGreenPulse{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,0.35)}50%{box-shadow:0 0 0 12px rgba(52,199,89,0)}}
    @keyframes fieldGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(196,154,42,0.3))}50%{filter:drop-shadow(0 0 16px rgba(196,154,42,0.6))}}
    @keyframes fieldSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fieldSlideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fieldFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fieldPop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes fieldShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    @keyframes fieldTimer{from{width:100%}to{width:0%}}
    @keyframes fieldSpin{to{transform:rotate(360deg)}}
    @keyframes fieldGradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes fieldCountUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="preview-container">
  <!-- Banner -->
  <div class="preview-banner">
    <img src="/assets/img/asgard_emblem.png" style="width:56px;height:56px;border-radius:14px;margin:0 auto 12px;animation:fieldGlow 3s ease infinite" alt="">
    <h1>ASGARD FIELD</h1>
    <p>Preview — All Screens (v1.4.0)</p>
    <p style="color:#71717A;font-size:0.75rem;margin-top:8px">10 screens with mock data</p>
  </div>

  <div id="screens"></div>
</div>

<script>
// ─── Mini Design System ────────────────────────────────────────────────
const t = {
  bg0: '#0D0D0F', bg1: '#18181B', bg2: '#1E1E23', bg3: '#27272B',
  surface: '#1E1E23', surfaceHover: '#27272B', surfaceActive: '#2E2E33',
  border: 'rgba(255,255,255,0.08)', borderLight: 'rgba(255,255,255,0.04)',
  text: '#F4F4F5', textSec: '#A1A1AA', textTer: '#71717A', textInv: '#0D0D0F',
  gold: '#D4A843', goldDark: '#C49A2A', goldLight: '#E8C560',
  green: '#34C759', greenBg: 'rgba(52,199,89,0.12)',
  red: '#E53935', redBg: 'rgba(229,57,53,0.12)',
  blue: '#3B82F6', blueBg: 'rgba(59,130,246,0.12)',
  orange: '#F59E0B', orangeBg: 'rgba(245,158,11,0.12)',
  heroGrad: 'linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%)',
  goldGrad: 'linear-gradient(135deg, #C49A2A 0%, #D4A843 50%, #E8C560 100%)',
  shiftActiveGrad: 'linear-gradient(135deg, #1A9F4A 0%, #34C759 100%)',
  dangerGrad: 'linear-gradient(135deg, #C62828 0%, #E53935 100%)',
  goldBg: 'linear-gradient(135deg, rgba(196,154,42,0.08) 0%, rgba(212,168,67,0.04) 100%)',
  cardGrad: 'linear-gradient(180deg, #1E1E23 0%, #18181B 100%)',
};

function el(tag, props, ...children) {
  const element = document.createElement(tag);
  if (props) {
    for (const [k, v] of Object.entries(props)) {
      if (k === 'style' && typeof v === 'object') Object.assign(element.style, v);
      else if (k === 'className') element.className = v;
      else if (k === 'innerHTML') element.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') element.addEventListener(k.slice(2).toLowerCase(), v);
      else element.setAttribute(k, v);
    }
  }
  for (const child of children) {
    if (child == null) continue;
    if (typeof child === 'string' || typeof child === 'number') element.appendChild(document.createTextNode(String(child)));
    else if (child instanceof Node) element.appendChild(child);
  }
  return element;
}

function fmtMoney(n) { return (n||0).toLocaleString('ru-RU', {maximumFractionDigits:0}); }
function fmtDate(s) { return s ? new Date(s).toLocaleDateString('ru-RU', {day:'numeric',month:'short'}) : ''; }
function fmtTime(s) { return s ? new Date(s).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : ''; }

// ─── Render Helper ─────────────────────────────────────────────────────
function addScreen(id, title) {
  const screens = document.getElementById('screens');
  const label = el('div', { className: 'screen-label' }, el('span', {}, title));
  screens.appendChild(label);
  const frame = el('div', { className: 'phone-frame', id });
  screens.appendChild(frame);
  return frame;
}

function header(title, hasBack, rightHtml) {
  const h = el('div', { style: {
    display:'flex', alignItems:'center', gap:'12px',
    padding:'12px 20px', background:t.bg1, borderBottom:'1px solid '+t.border,
    minHeight:'48px',
  }});
  if (hasBack) h.appendChild(el('div', { style: {fontSize:'1.25rem',color:t.textSec}, innerHTML:'&#8592;' }));
  h.appendChild(el('img', { src:'/assets/img/asgard_emblem.png', style: {height:'28px',width:'28px',borderRadius:'6px'} }));
  h.appendChild(el('div', { style: {flex:'1',color:t.text,fontWeight:'600',fontSize:'1.125rem'} }, title));
  if (rightHtml) h.appendChild(rightHtml);
  return h;
}

function badge(text, color) {
  const c = color || t.gold;
  return el('span', { style: {
    fontSize:'0.6875rem', fontWeight:'600', padding:'3px 10px', borderRadius:'9999px',
    background:c+'18', color:c,
  }}, text);
}

function sectionLabel(text) {
  return el('div', { style: {
    color:t.textTer, fontSize:'0.6875rem', fontWeight:'600', letterSpacing:'0.08em',
    textTransform:'uppercase', marginBottom:'10px',
  }}, text);
}

function card(s) {
  const c = el('div', { style: {
    background:t.surface, borderRadius:'16px', padding:'16px',
    border:'1px solid '+t.border, animation:'fieldSlideUp 0.4s ease '+(s.delay||0)+'s both',
  }});
  if (s.title) {
    const top = el('div', { style: {display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'} });
    top.appendChild(el('div', { style: {color:t.text,fontWeight:'600',fontSize:'1rem',flex:'1'} }, s.title));
    if (s.badge) top.appendChild(badge(s.badge, s.badgeColor));
    c.appendChild(top);
  }
  if (s.sub) c.appendChild(el('div', { style: {color:t.textSec,fontSize:'0.8125rem',marginTop:'4px'} }, s.sub));
  return c;
}

function moneyCard(amount, label, detail, delay) {
  const c = el('div', { style: {
    background:t.goldBg, borderRadius:'16px', padding:'20px',
    border:'1px solid rgba(196,154,42,0.15)', animation:'fieldSlideUp 0.4s ease '+(delay||0)+'s both',
  }});
  if (label) c.appendChild(el('div', { style: {color:t.textSec,fontSize:'0.75rem',fontWeight:'600',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'8px'} }, label));
  c.appendChild(el('div', { style: {color:t.gold,fontWeight:'700',fontSize:'2rem',lineHeight:'1.1'} },
    fmtMoney(amount), el('span', { style: {fontSize:'1.25rem',fontWeight:'600',marginLeft:'4px',color:t.goldDark} }, ' \u20BD')));
  if (detail) c.appendChild(el('div', { style: {color:t.textTer,fontSize:'0.75rem',marginTop:'8px'} }, detail));
  return c;
}

function bigButton(label, icon, variant, pulse) {
  const grads = { gold:t.goldGrad, green:t.shiftActiveGrad, red:t.dangerGrad, secondary:t.bg3 };
  return el('button', { style: {
    width:'100%', height:'64px', border:'none', borderRadius:'44px',
    background:grads[variant]||grads.gold, color:variant==='secondary'?t.text:'#FFF',
    fontSize:'1.125rem', fontWeight:'700', display:'flex', alignItems:'center', justifyContent:'center', gap:'10px',
    animation:pulse?'fieldPulse 2.5s infinite':'none',
  }},
    icon ? el('span', { style: {fontSize:'1.3rem'} }, icon) : null,
    el('span', {}, label)
  );
}

function wrap(padding) {
  return el('div', { style: { padding:padding||'16px 20px 24px', display:'flex', flexDirection:'column', gap:'16px' } });
}

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 1: LOGIN
// ═══════════════════════════════════════════════════════════════════════
(function renderLogin() {
  const f = addScreen('s-login', '1. Login — \u0412\u0445\u043E\u0434 \u043F\u043E SMS');
  const page = el('div', { style: {
    minHeight:'700px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
    padding:'40px 24px', background:t.heroGrad, backgroundSize:'200% 200%', animation:'fieldGradShift 12s ease infinite',
    position:'relative', overflow:'hidden',
  }});
  // Pattern
  page.appendChild(el('div', { style: {
    position:'absolute', inset:'0', opacity:'0.02',
    backgroundImage:'radial-gradient(circle at 25% 25%, #fff 1px, transparent 1px)',
    backgroundSize:'48px 48px', pointerEvents:'none',
  }}));
  const w = el('div', { style: {position:'relative',zIndex:'1',width:'100%',maxWidth:'340px',display:'flex',flexDirection:'column',alignItems:'center'} });
  w.appendChild(el('img', { src:'/assets/img/asgard_emblem.png', style: {width:'100px',height:'100px',borderRadius:'20px',animation:'fieldGlow 3s ease infinite',marginBottom:'20px'} }));
  w.appendChild(el('div', { style: {color:t.gold,fontWeight:'700',fontSize:'2rem',letterSpacing:'4px',marginBottom:'4px'} }, 'ASGARD'));
  w.appendChild(el('div', { style: {color:t.textSec,fontSize:'0.6875rem',fontWeight:'600',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'24px'} }, '\u041F\u041E\u041B\u0415\u0412\u041E\u0419 \u041C\u041E\u0414\u0423\u041B\u042C'));
  w.appendChild(el('div', { style: {width:'40px',height:'2px',borderRadius:'1px',background:t.goldGrad,opacity:'0.4',marginBottom:'32px'} }));
  // Phone input
  const phoneWrap = el('div', { style: {width:'100%',display:'flex',flexDirection:'column',gap:'16px'} });
  phoneWrap.appendChild(el('input', { type:'tel', value:'+7 (916) 555-12-34', readOnly:true, style: {
    width:'100%',height:'56px',boxSizing:'border-box',background:'rgba(255,255,255,0.06)',
    border:'2px solid '+t.gold, borderRadius:'14px', padding:'0 20px',
    color:t.text, fontSize:'1.25rem', fontWeight:'500', letterSpacing:'0.5px', textAlign:'center', outline:'none',
  }}));
  phoneWrap.appendChild(bigButton('\u041F\u041E\u041B\u0423\u0427\u0418\u0422\u042C \u041A\u041E\u0414', null, 'gold'));
  w.appendChild(phoneWrap);
  page.appendChild(w);
  // Quote
  page.appendChild(el('div', { style: {
    position:'absolute', bottom:'24px', left:'24px', right:'24px', textAlign:'center',
    color:'rgba(255,255,255,0.15)', fontSize:'0.75rem', fontStyle:'italic',
  }}, '\u00AB\u0420\u0430\u043D\u043E \u0432\u0441\u0442\u0430\u043B \u2014 \u0443\u0436\u0435 \u043F\u043E\u0431\u0435\u0434\u0438\u043B\u00BB'));
  f.appendChild(page);
})();

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 2: HOME
// ═══════════════════════════════════════════════════════════════════════
(function renderHome() {
  const f = addScreen('s-home', '2. Home — \u0413\u043B\u0430\u0432\u043D\u0430\u044F');
  f.appendChild(header('ASGARD', false));
  // Hero
  const hero = el('div', { style: {
    position:'relative', padding:'24px 20px 20px',
    background:t.heroGrad, backgroundSize:'200% 200%', animation:'fieldGradShift 8s ease infinite',
    overflow:'hidden', borderRadius:'0 0 20px 20px',
  }});
  hero.appendChild(el('div', { style: {position:'absolute',right:'-10px',top:'50%',transform:'translateY(-50%)',fontSize:'4rem',fontWeight:'900',color:'rgba(255,255,255,0.03)',letterSpacing:'4px',pointerEvents:'none'} }, 'ASGARD'));
  const hc = el('div', { style: {position:'relative',zIndex:'1'} });
  hc.appendChild(el('img', { src:'/assets/img/asgard_emblem.png', style: {width:'24px',height:'24px',borderRadius:'4px',marginBottom:'8px',animation:'fieldGlow 3s ease infinite'} }));
  hc.appendChild(el('div', { style: {color:t.text,fontWeight:'700',fontSize:'1.5rem',lineHeight:'1.2',marginBottom:'4px'} }, '\u0414\u043E\u0431\u0440\u043E\u0435 \u0443\u0442\u0440\u043E, \u0410\u043B\u0435\u043A\u0441\u0435\u0439!'));
  hc.appendChild(el('div', { style: {color:t.textSec,fontSize:'0.875rem',marginBottom:'12px'} }, '\u0432\u043E\u0441\u043A\u0440\u0435\u0441\u0435\u043D\u044C\u0435, 30 \u043C\u0430\u0440\u0442\u0430'));
  hc.appendChild(el('div', { style: {color:t.gold,fontStyle:'italic',fontSize:'0.8125rem',lineHeight:'1.4',animation:'fieldFadeIn 1s ease 0.5s both'} }, '\u00AB\u0410\u0441\u0433\u0430\u0440\u0434 \u0441\u0442\u0440\u043E\u0438\u0442\u0441\u044F \u043A\u0430\u0436\u0434\u044B\u0439 \u0434\u0435\u043D\u044C\u00BB'));
  hero.appendChild(hc);
  f.appendChild(hero);

  const c = wrap();
  // Project card
  const pc = card({ title:'\u041B\u0443\u043A\u043E\u0439\u043B \u2014 \u041E\u0431\u0449\u0435\u0441\u0442\u0440\u043E\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0435 \u0440\u0430\u0431\u043E\u0442\u044B', sub:'\u041C\u043E\u0441\u043A\u0432\u0430 \u00B7 \u041B\u0443\u043A\u043E\u0439\u043B \u0420\u0443\u0441\u044C', badge:'\u25B6 \u0410\u043A\u0442\u0438\u0432\u043D\u044B\u0439', badgeColor:t.green, delay:0.1 });
  const callRow = el('div', { style: {display:'flex',gap:'8px',marginTop:'12px',flexWrap:'wrap'} });
  callRow.appendChild(el('a', { href:'#', style: {display:'inline-flex',alignItems:'center',gap:'8px',padding:'8px 16px',borderRadius:'9999px',background:t.bg2,border:'1px solid '+t.border,color:t.text,fontSize:'0.875rem'} }, '\uD83D\uDCDE \u0420\u041F: \u0418\u0432\u0430\u043D\u043E\u0432 \u0410.\u0412.'));
  callRow.appendChild(el('a', { href:'#', style: {display:'inline-flex',alignItems:'center',gap:'8px',padding:'8px 16px',borderRadius:'9999px',background:t.bg2,border:'1px solid '+t.border,color:t.text,fontSize:'0.875rem'} }, '\uD83D\uDCDE \u041C\u0430\u0441\u0442\u0435\u0440: \u041F\u0435\u0442\u0440\u043E\u0432'));
  pc.appendChild(callRow);
  c.appendChild(pc);

  // Shift button
  c.appendChild(el('div', { style: {animation:'fieldSlideUp 0.4s ease 0.2s both'} },
    bigButton('\u041D\u0410\u0427\u0410\u0422\u042C \u0421\u041C\u0415\u041D\u0423', '\u2694\uFE0F', 'gold', true)
  ));

  // Money card
  c.appendChild(moneyCard(4500, '\u0421\u0435\u0433\u043E\u0434\u043D\u044F \u0437\u0430\u0440\u0430\u0431\u043E\u0442\u0430\u043D\u043E', '4 500\u20BD/\u0441\u043C\u0435\u043D\u0430 + \u043F\u0430\u0439\u043A\u043E\u0432\u044B\u0435 700\u20BD/\u0441\u0443\u0442', 0.3));

  // Tariff
  const tariffCard = el('div', { style: {background:t.surface,borderRadius:'16px',padding:'14px 16px',border:'1px solid '+t.border,animation:'fieldSlideUp 0.4s ease 0.4s both'} });
  tariffCard.appendChild(el('div', { style: {color:t.textTer,fontSize:'0.6875rem',fontWeight:'600',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'6px'} }, '\u0422\u0410\u0420\u0418\u0424'));
  tariffCard.appendChild(el('div', { style: {color:t.text,fontSize:'0.875rem',fontWeight:'500'} }, '\u0418\u0437\u043E\u043B\u0438\u0440\u043E\u0432\u0449\u0438\u043A \u00B7 9 \u0431\u0430\u043B\u043B\u043E\u0432'));
  tariffCard.appendChild(el('div', { style: {color:t.gold,fontSize:'0.8125rem',marginTop:'4px'} }, '+ \u0421\u043E\u0432\u043C\u0435\u0449\u0435\u043D\u0438\u0435: \u041C\u043E\u043D\u0442\u0430\u0436\u043D\u0438\u043A (+1 \u0431\u0430\u043B\u043B)'));
  c.appendChild(tariffCard);

  // Quick actions
  const grid = el('div', { style: {display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'12px',animation:'fieldSlideUp 0.4s ease 0.5s both'} });
  const actions = [
    {icon:'\uD83D\uDCB0',label:'\u0414\u0435\u043D\u044C\u0433\u0438'},{icon:'\u2708\uFE0F',label:'\u0411\u0438\u043B\u0435\u0442\u044B'},{icon:'\uD83D\uDCF7',label:'\u0424\u043E\u0442\u043E'},{icon:'\uD83D\uDCCB',label:'\u0418\u0441\u0442\u043E\u0440\u0438\u044F'},
    {icon:'\uD83D\uDC65',label:'\u0411\u0440\u0438\u0433\u0430\u0434\u0430'},{icon:'\uD83D\uDCDD',label:'\u041E\u0442\u0447\u0451\u0442'},{icon:'\u26A0\uFE0F',label:'\u0418\u043D\u0446\u0438\u0434\u0435\u043D\u0442'},{icon:'\uD83D\uDC64',label:'\u041F\u0440\u043E\u0444\u0438\u043B\u044C'},
  ];
  for (const a of actions) {
    const btn = el('div', { style: {
      display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',
      padding:'14px 4px',borderRadius:'14px',background:t.surface,border:'1px solid '+t.border,
    }});
    btn.appendChild(el('span', { style: {fontSize:'1.5rem'} }, a.icon));
    btn.appendChild(el('span', { style: {fontSize:'0.6875rem',fontWeight:'500',color:t.textSec} }, a.label));
    grid.appendChild(btn);
  }
  c.appendChild(grid);
  f.appendChild(c);
})();

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 3: SHIFT (active)
// ═══════════════════════════════════════════════════════════════════════
(function renderShift() {
  const f = addScreen('s-shift', '3. Shift — \u0421\u043C\u0435\u043D\u0430 (\u0430\u043A\u0442\u0438\u0432\u043D\u0430\u044F)');
  f.appendChild(header('\u0421\u043C\u0435\u043D\u0430', true));
  const c = wrap('20px');

  // Status card
  const sc = el('div', { style: {
    background:t.greenBg, borderRadius:'20px', padding:'24px', textAlign:'center',
    border:'1px solid rgba(52,199,89,0.2)', animation:'fieldSlideUp 0.4s ease both',

  const prevCard = el('div', { style: {background:t.surface,borderRadius:'16px',padding:'14px',border:'1px solid '+t.border,animation:'fieldSlideUp 0.4s ease 0.4s both'} });
  prevCard.appendChild(sectionLabel('\u041F\u0420\u0415\u0414\u042B\u0414\u0423\u0429\u0418\u0415 \u0418\u041D\u0426\u0418\u0414\u0415\u041D\u0422\u042B'));
  const prevInc = [
    ['\uD83C\uDF27\uFE0F','\u0421\u0438\u043B\u044C\u043D\u044B\u0439 \u0434\u043E\u0436\u0434\u044C, \u043E\u0441\u0442\u0430\u043D\u043E\u0432\u043A\u0430 \u0440\u0430\u0431\u043E\u0442 \u043D\u0430 2\u0447','25 \u043C\u0430\u0440.','low',t.green],
    ['\uD83D\uDCE6','\u0417\u0430\u0434\u0435\u0440\u0436\u043A\u0430 \u043F\u043E\u0441\u0442\u0430\u0432\u043A\u0438 \u0443\u0442\u0435\u043F\u043B\u0438\u0442\u0435\u043B\u044F','20 \u043C\u0430\u0440.','medium',t.orange],
  ];
  for (const [icon,desc,date,sev,col] of prevInc) {
    const r = el('div', { style: {display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid '+t.borderLight} });
    r.appendChild(el('span', { style: {fontSize:'1rem'} }, icon));
    const info = el('div', { style: {flex:'1'} });
    info.appendChild(el('div', { style: {color:t.text,fontSize:'0.8125rem'} }, desc));
    info.appendChild(el('div', { style: {color:t.textTer,fontSize:'0.6875rem'} }, date));
    r.appendChild(info);
    r.appendChild(badge(sev, col));
    prevCard.appendChild(r);
  }
  c.appendChild(prevCard);
  f.appendChild(c);
})();

// SCREEN 11: PHOTOS
// ═══════════════════════════════════════════════════════════════════════
(function renderPhotos() {
  const f = addScreen('s-photos', '11. Photos — \u0424\u043E\u0442\u043E\u043E\u0442\u0447\u0451\u0442\u044B');
  const rightBtn = el('button', { style: {padding:'6px 14px',borderRadius:'10px',border:'none',background:t.goldGrad,color:'#FFF',fontSize:'0.8125rem',fontWeight:'600'} }, '+ \u0424\u043E\u0442\u043E');
  f.appendChild(header('\u0424\u043E\u0442\u043E\u043E\u0442\u0447\u0451\u0442\u044B', true, rightBtn));
  const c = wrap();

  // Date label
  c.appendChild(el('div', { style: {color:t.textTer,fontSize:'0.75rem',fontWeight:'600',marginTop:'4px',animation:'fieldSlideUp 0.4s ease both'} }, '30 \u043C\u0430\u0440\u0442\u0430 2026'));

  // Photo grid
  const grid = el('div', { style: {display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'4px',borderRadius:'12px',overflow:'hidden',animation:'fieldSlideUp 0.4s ease 0.05s both'} });
  const colors = ['#2a3a5c','#3a2a5c','#2a5c3a','#5c3a2a','#3a5c5c','#5c5c2a'];
  for (let i = 0; i < 6; i++) {
    const thumb = el('div', { style: {
      aspectRatio:'1',background:colors[i],
      display:'flex',alignItems:'center',justifyContent:'center',
      color:'rgba(255,255,255,0.3)',fontSize:'2rem',
    }}, '\uD83D\uDCF7');
    if (i === 0) {
      thumb.appendChild(el('div', { style: {
        position:'absolute',bottom:'4px',left:'4px',
        padding:'2px 6px',borderRadius:'4px',background:'rgba(0,0,0,0.6)',
        color:'#FFF',fontSize:'0.5rem',fontWeight:'600',
      }}, 'before'));
      thumb.style.position = 'relative';
    }
    grid.appendChild(thumb);
  }
  c.appendChild(grid);

  // Another date
  c.appendChild(el('div', { style: {color:t.textTer,fontSize:'0.75rem',fontWeight:'600',marginTop:'4px',animation:'fieldSlideUp 0.4s ease 0.15s both'} }, '29 \u043C\u0430\u0440\u0442\u0430 2026'));
  const grid2 = el('div', { style: {display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'4px',borderRadius:'12px',overflow:'hidden',animation:'fieldSlideUp 0.4s ease 0.2s both'} });
  for (let i = 0; i < 3; i++) {
    grid2.appendChild(el('div', { style: {
      aspectRatio:'1',background:colors[i+3],
      display:'flex',alignItems:'center',justifyContent:'center',
      color:'rgba(255,255,255,0.3)',fontSize:'2rem',
    }}, '\uD83D\uDCF7'));
  }
  c.appendChild(grid2);
  f.appendChild(c);
})();
